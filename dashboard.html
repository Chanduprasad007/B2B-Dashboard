var rm = String(r['RM Name']||'').trim();
var isWA = !!r['ID']; // WA rows have ID field, callTkts don't
if (!dimMap[dimVal]) dimMap[dimVal] = { total:0, ct:0, wa:0, issues:{}, subIssues:{}, channels:{}, brokers:{}, branches:{}, rms:{} };
dimMap[dimVal].total++;
if (isWA) dimMap[dimVal].wa++; else dimMap[dimVal].ct++;
dimMap[dimVal].issues[issue] = (dimMap[dimVal].issues[issue]||0)+1;
if (subIss) dimMap[dimVal].subIssues[subIss] = (dimMap[dimVal].subIssues[subIss]||0)+1;
if (channel) dimMap[dimVal].channels[channel] = (dimMap[dimVal].channels[channel]||0)+1;
if (broker) dimMap[dimVal].brokers[broker] = (dimMap[dimVal].brokers[broker]||0)+1;
if (branch) dimMap[dimVal].branches[branch] = (dimMap[dimVal].branches[branch]||0)+1;
if (rm && activeDim !== 'rm') dimMap[dimVal].rms[rm] = (dimMap[dimVal].rms[rm]||0)+1;
});

var sorted = Object.keys(dimMap).sort(function(a,b){ return dimMap[b].total - dimMap[a].total; });

// Summary table
html += '<div class="section-head">'+dimLabels[activeDim]+' — Volume Summary</div>';
html += '<div class="table-card"><div class="table-wrap"><table><thead><tr>';
html += '<th>'+dimLabels[activeDim]+'</th><th>Total</th><th>Call Tickets</th><th>WhatsApp</th><th>Top Issue</th><th>Top Sub-Issue</th>';
html += '</tr></thead><tbody>';
sorted.forEach(function(dim) {
var d = dimMap[dim];
var topIssue = topKey(d.issues);
var topSubIss = topKey(d.subIssues);
html += '<tr><td><strong>'+dim+'</strong></td><td><span class="badge badge-blue">'+d.total+'</span></td>';
html += '<td>'+(d.ct||'-')+'</td><td>'+(d.wa||'-')+'</td>';
html += '<td>'+(topIssue?'<span class="badge badge-amber">'+topIssue+'</span>':'-')+'</td>';
html += '<td style="color:var(--c-text2);font-size:11px">'+(topSubIss||'-')+'</td></tr>';
});
html += '</tbody></table></div></div>';

// Expanded issue breakdown per dimension (top 10 dimensions)
html += '<div class="section-head">Issue Breakdown by '+dimLabels[activeDim]+'</div>';
html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:24px">';
sorted.slice(0,12).forEach(function(dim) {
var d = dimMap[dim];
var issArr = Object.keys(d.issues).sort(function(a,b){return d.issues[b]-d.issues[a];}).slice(0,6);
var maxV = issArr.length ? d.issues[issArr[0]] : 1;
html += '<div class="ins-card"><h3 style="font-size:12px">'+dim+' <span class="badge-count badge">'+d.total+'</span></h3>';
issArr.forEach(function(iss) {
var w = Math.round(d.issues[iss]/maxV*100);
var p = pct(d.issues[iss],d.total);
html += '<div class="bar-row"><div class="bar-label">'+iss+'</div>';
html += '<div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:var(--c-blue);opacity:0.75"></div></div>';
html += '<div class="bar-val">'+d.issues[iss]+'</div><div class="bar-pct">'+p+'%</div></div>';
});
if(d.ct && d.wa) html += '<div style="font-size:10px;color:var(--c-text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--c-border)">CT: '+d.ct+' &nbsp;|&nbsp; WA: '+d.wa+'</div>';
html += '</div>';
});
html += '</div>';

// Cross-tab: issue type vs dimension heatmap table
html += '<div class="section-head">Issue × '+dimLabels[activeDim]+' Heatmap</div>';
var allIssues = {};
allRows.forEach(function(r){ var v=String(r['Issue Type (B2B)']||r['Issue']||r['Category']||'').trim()||'Unknown'; allIssues[v]=(allIssues[v]||0)+1; });
var topIssues = Object.keys(allIssues).sort(function(a,b){return allIssues[b]-allIssues[a];}).slice(0,8);
var topDims = sorted.slice(0,10);

html += '<div class="monthly-table-wrap"><table class="monthly-table"><thead><tr>';
html += '<th class="row-label">'+dimLabels[activeDim]+'</th>';
topIssues.forEach(function(iss){ html += '<th>'+iss.substring(0,18)+(iss.length>18?'…':'')+'</th>'; });
html += '<th>Total</th></tr></thead><tbody>';
topDims.forEach(function(dim) {
var d = dimMap[dim];
html += '<tr><td class="row-label"><strong>'+dim+'</strong></td>';
topIssues.forEach(function(iss) {
var v = d.issues[iss] || 0;
var intensity = v ? Math.min(Math.round(v/allIssues[iss]*100), 100) : 0;
var bg = v ? 'background:rgba(59,130,246,'+( 0.1 + intensity/100*0.6).toFixed(2)+')' : '';
html += '<td style="text-align:center;'+bg+'">'+(v||'')+'</td>';
});
html += '<td><strong>'+d.total+'</strong></td></tr>';
});
html += '</tbody></table></div>';

c.innerHTML = html;
}

function topKey(obj) {
var keys = Object.keys(obj);
if (!keys.length) return '';
return keys.sort(function(a,b){return obj[b]-obj[a];})[0];
}

// Live search filter for comment table
function filterCommentTable() {
var q = (document.getElementById('comment-search').value || '').toLowerCase().trim();
var rows = document.querySelectorAll('#comment-table .comment-row');
var shown = 0;
rows.forEach(function(row) {
var match = !q || (row.getAttribute('data-search')||'').indexOf(q) !== -1;
row.style.display = match ? '' : 'none';
if (match) shown++;
});
var el = document.getElementById('comment-count');
if (el) el.textContent = shown + ' records';
}

{h:'Column headers changing in source data',b:'If DevRev or Ozonetel changes a column name (e.g. "Owner[0]" becomes "Assignee"), that metric shows "-" everywhere. Fix: update the relevant column name in COLS in Code.gs.'},
{h:'Pasting data without running Fix All Dates',b:'Date parsing fails. All tabs show "-" or 0. Always fix dates before rebuilding cache.'},
{h:'Deleting the Drive cache file',b:'"smallcase_dashboard_cache.json" in your Drive root is the data source. If deleted, run Force Rebuild Cache to recreate. The dashboard falls back to reading sheets directly if the file is missing, but this is slow.'},
{h:'Code change without re-deploying',b:'After editing Code.gs or dashboard.html in Apps Script, you must Deploy → Manage Deployments → Edit → New Version → Deploy. Otherwise teammates still see the old version.'},
]);
h+='</div><div>';
h+=sec('Active Automations & Configuration','&#9881;','purple',[
{h:'Paste detection trigger (onChange)',b:'Fires automatically ~15 seconds after you paste data into any of the 4 data sheets. Runs Fix All Dates then rebuilds the cache. Requires one-time setup: Support Dashboard → "⚡ Setup All Triggers (run once)". Verify it is active: Support Dashboard → Check Active Triggers.'},
{h:'3 daily schedule triggers (9:30 / 10:30 / 11:30 AM IST)',b:'Runs buildDashboardCache() at each scheduled time regardless of whether data was pasted. Acts as a safety net — even if the paste trigger failed or data was pasted outside normal hours. All 4 triggers set up together via "⚡ Setup All Triggers (run once)".'},
{h:'Claude API — AI Summary tab',b:'Uses claude-haiku-4-5 model. API key stored in CLAUDE_API_KEY at top of Code.gs. If AI Summary tab shows "API key not set", paste your key there and re-deploy. Each summary run costs ~$0.005–$0.01.'},
{h:'Google Drive cache file',b:'File: smallcase_dashboard_cache.json in Drive root. Typically 1–3 MB. Built by triggers daily and manually via Force Rebuild Cache. Dashboard load time: 1–3 seconds from cache vs 15–30 seconds from sheets.'},
{h:'Web App URL',b:'The dashboard is a deployed Apps Script Web App. Anyone with the URL can view it (no login required, set to "Anyone"). If URL ever breaks, re-deploy: Deploy → Manage Deployments → edit → New Version.'},
{h:'Script timezone: Asia/Kolkata',b:'Project Settings → Time zone. Must stay as Asia/Kolkata or triggers fire at wrong times. Check this if triggers seem to run at odd hours.'},
]);
h+=sec('Apps Script Quick Reference','&#128295;','teal',[
{h:'How to access it',b:'Google Sheet → Extensions → Apps Script. Two files: Code.gs (all server-side logic) and dashboard.html (entire frontend — all 10 tabs).'},
{h:'Test data is loading correctly',b:'Support Dashboard → Test: Row Counts. Shows rows loaded per sheet + cache file status + last build time. Fastest debug tool.'},
{h:'If triggers go missing',b:'Support Dashboard → "⚡ Setup All Triggers (run once)". This recreates all 4 triggers: the 3 daily schedule triggers and the onChange paste-detection trigger. Triggers are tied to the Google account that ran setup — not the file owner.'},
{h:'If dashboard shows "Cache empty — reading sheets"',b:'This means cache file is empty or corrupt. Run Force Rebuild Cache from the menu. Dashboard still loads (just slower, reading sheets directly as fallback).'},
{h:'Mobile number deduplication',b:'Numbers like +919164567759, 919164567759, 9164567759 are treated as the same caller. This is handled client-side by normMobile() — no config needed.'},
]);

function chartOpts(yLabel) {
return {
responsive: true, maintainAspectRatio: true,
plugins: { legend: { labels: { font: { size: 10, family: 'Inter' }, color: '#475569', boxWidth: 10 } } },
scales: {
x: {
ticks: { font: { size: 9, family: 'Inter' }, color: '#94A3B8', maxRotation: 45 },
grid: { display: false },
border: { color: '#E2E8F0' }
},
y: {
ticks: { font: { size: 9, family: 'Inter' }, color: '#94A3B8' },
grid: { color: '#F1F5F9' },
border: { dash: [3,3], color: 'transparent' },
title: { display: !!yLabel, text: yLabel, font: { size: 9, family: 'Inter' }, color: '#94A3B8' }
}
}
};
}
