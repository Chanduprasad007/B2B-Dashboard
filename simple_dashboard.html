<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>smallcase · B2B Weekly Pulse</title>
<link rel="icon" type="image/png" href="https://i.ibb.co/zWjPBDY1/sc-simple.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--border2:#cbd5e1;
--navy:#0f172a;--blue:#3b82f6;--blue-d:#1d4ed8;--blue-lt:#eff6ff;--blue-md:#dbeafe;
--green:#10b981;--green-lt:#ecfdf5;--red:#ef4444;--red-lt:#fef2f2;
--amber:#f59e0b;--amber-lt:#fffbeb;--amber-md:#fef3c7;
--purple:#8b5cf6;--purple-lt:#f5f3ff;--teal:#14b8a6;--teal-lt:#f0fdfa;
--txt:#1e293b;--txt2:#475569;--txt3:#94a3b8;
--r:12px;--r-sm:8px;
--sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
--sh-md:0 4px 16px rgba(0,0,0,.08);--sh-lg:0 20px 40px rgba(0,0,0,.12);
}

/* ─── GAMIFIED / AI DARK MODE ─── */
body.dark-mode {
--bg: #0b0f19;
--surface: #141b2d;
--surface2: #1f2940;
--border: #2a3854;
--border2: #384b6e;
--navy: #f8fafc;
--blue: #00e5ff;
--blue-d: #00b8d4;
--blue-lt: rgba(0, 229, 255, 0.15);
--blue-md: rgba(0, 229, 255, 0.3);
--green: #00ffaa;
--green-lt: rgba(0, 255, 170, 0.15);
--red: #ff3366;
--red-lt: rgba(255, 51, 102, 0.15);
--amber: #ffbb00;
--amber-lt: rgba(255, 187, 0, 0.15);
--amber-md: rgba(255, 187, 0, 0.3);
--purple: #b233ff;
--purple-lt: rgba(178, 51, 255, 0.15);
--teal: #00e5ff;
--teal-lt: rgba(0, 229, 255, 0.15);
--txt: #cbd5e1;
--txt2: #94a3b8;
--txt3: #64748b;
--sh: 0 4px 15px rgba(0, 0, 0, 0.3);
--sh-md: 0 0 20px rgba(0, 229, 255, 0.2);
--sh-lg: 0 0 40px rgba(0, 229, 255, 0.2);
}

body.dark-mode ::-webkit-scrollbar { width: 8px; height: 8px; }
body.dark-mode ::-webkit-scrollbar-track { background: var(--bg); }
body.dark-mode ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
body.dark-mode ::-webkit-scrollbar-thumb:hover { background: var(--blue); }

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased; transition: background 0.3s, color 0.3s;}
.link-style{color:var(--blue-d);text-decoration:none;font-weight:700}
.link-style:hover{text-decoration:underline}

/* ─── TOPBAR ─── */
.topbar{background:var(--navy);color:#fff;height:56px;display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2); transition: all 0.3s;}
body.dark-mode .topbar { background: rgba(11, 15, 25, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); box-shadow: 0 0 15px rgba(0, 229, 255, 0.1); }
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{width:32px;height:32px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
body.dark-mode .topbar-logo { background: linear-gradient(135deg, #00e5ff, #b233ff); box-shadow: 0 0 10px rgba(178,51,255,0.5); }
.topbar h1{font-size:15px;font-weight:700;letter-spacing:-.3px}
.topbar-sub{font-size:11px;color:#94a3b8;margin-left:4px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.topbar-btn{padding:6px 14px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;transition:all .2s}
.topbar-btn:hover{background:rgba(255,255,255,.18)}
.topbar-btn.primary{background:var(--blue-d);border-color:transparent;box-shadow:0 2px 6px rgba(29,78,216,.4)}
#status-pill{font-size:11px;color:#94a3b8;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 12px}

/* ─── LAYOUT ─── */
.page{max-width:1400px;margin:0 auto;padding:24px 28px}

/* ─── CHANNEL TOGGLE ─── */
.channel-bar{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:16px;}
.channel-btn{padding:8px 18px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--txt2);font-family:inherit;transition:all .2s;}
.channel-btn:hover{background:var(--surface2);color:var(--navy);}
.channel-btn.active{background:var(--navy);color:var(--surface);border-color:var(--navy);}
body.dark-mode .channel-btn {background:var(--surface);color:var(--txt3);border-color:var(--border2);}
body.dark-mode .channel-btn:hover {color:var(--blue);border-color:var(--blue);}
body.dark-mode .channel-btn.active {background:var(--blue-md);color:var(--blue);border-color:var(--blue);box-shadow: 0 0 10px rgba(0, 229, 255, 0.15);}

/* ─── WEEK SELECTOR ─── */
.week-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 18px;margin-bottom:24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:var(--sh)}
.week-bar label{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px}
.week-btn{padding:8px 12px;border:1px solid var(--border);border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--txt2);font-family:inherit;transition:all .2s;text-align:center;line-height:1.25;white-space:normal;min-width:176px;min-height:48px;display:flex;align-items:center;justify-content:center}
.week-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.week-btn.active{background:var(--navy);color:var(--surface);border-color:var(--navy);font-weight:600}
body.dark-mode .week-btn.active { background: var(--blue-lt); border-color: var(--blue); color: var(--blue); box-shadow: 0 0 10px rgba(0, 229, 255, 0.1); }
.week-custom{display:flex;align-items:center;gap:8px;margin-left:auto}
.week-custom input{border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 10px;font-size:12px;font-family:inherit;background:var(--surface);color:var(--txt)}
.week-custom input:focus{outline:none;border-color:var(--blue)}
body.dark-mode .week-custom input { color-scheme: dark; }
.apply-btn{padding:6px 16px;background:var(--blue-d);color:#fff;border:none;border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.week-scroll-wrap{display:flex;gap:8px;overflow-x:auto;flex:1;min-width:280px;padding-bottom:2px;scroll-snap-type:x mandatory}
.week-scroll-wrap::-webkit-scrollbar{height:8px}
.week-scroll-wrap::-webkit-scrollbar-track{background:var(--surface2);border-radius:4px}
.week-scroll-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.week-scroll-viewport{display:flex;align-items:center;gap:8px;max-width:760px;flex:1;min-width:280px;overflow:hidden}
.week-nav-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--txt2);cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .2s;flex:0 0 auto}
.week-nav-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.state-heat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.state-tile{border:1px solid var(--border);border-radius:10px;background:var(--surface);padding:10px;cursor:pointer;transition:all .2s}
.state-tile:hover{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-lt)}
.state-tile.active{border-color:var(--blue-d);background:var(--blue-lt)}
.state-tile .nm{font-size:11px;font-weight:700;color:var(--navy)}
.state-tile .ct{font-size:18px;font-weight:800;color:var(--blue-d);margin-top:4px}
.month-bar{display:flex;gap:8px;flex-wrap:wrap;margin:-10px 0 24px;padding-left:2px}
.month-btn{padding:6px 14px;border:1px solid var(--border);border-radius:999px;font-size:11px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--txt2);font-family:inherit;transition:all .2s}
.month-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.month-btn.active{background:var(--blue-lt);color:var(--blue-d);border-color:var(--blue-md);box-shadow:0 0 0 2px rgba(59,130,246,.08)}
body.dark-mode .month-btn.active{background:var(--blue-lt);color:var(--blue);border-color:var(--blue)}

/* ─── SECTION HEADING ─── */
.sec-head{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px;margin:28px 0 14px;padding-left:12px;border-left:4px solid var(--blue-d);display:flex;align-items:center;justify-content:space-between; transition: color 0.3s;}
body.dark-mode .sec-head { color: var(--blue); text-shadow: 0 0 8px rgba(0, 229, 255, 0.4); border-left-color: var(--blue); }
.sec-head span{font-size:10px;color:var(--txt3);font-weight:500;text-transform:none;letter-spacing:0;border:none;padding:0; text-shadow:none;}
.deepdive-indicator{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:9px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;background:var(--blue-lt);color:var(--blue-d);border:1px solid var(--blue-md)}
body.dark-mode .deepdive-indicator{color:var(--blue);border-color:var(--blue-md)}

/* ─── KPI CARDS ─── */
.kpi-grid{display:grid;gap:14px;margin-bottom:24px}
.kpi-grid.c5{grid-template-columns:repeat(5,1fr)}
.kpi-grid.c4{grid-template-columns:repeat(4,1fr)}
.kpi-grid.c3{grid-template-columns:repeat(3,1fr)}
.kpi-grid.c2{grid-template-columns:repeat(2,1fr)}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:all .25s; cursor:pointer;}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.blue::before{background:linear-gradient(90deg,#1d4ed8,#3b82f6)}
.kpi-card.green::before{background:linear-gradient(90deg,#059669,#10b981)}
.kpi-card.red::before{background:linear-gradient(90deg,#b91c1c,#ef4444)}
.kpi-card.amber::before{background:linear-gradient(90deg,#d97706,#f59e0b)}
.kpi-card.purple::before{background:linear-gradient(90deg,#7c3aed,#8b5cf6)}
.kpi-card.teal::before{background:linear-gradient(90deg,#0d9488,#14b8a6)}

/* Gamified KPI Cards */
body.dark-mode .kpi-card { background: linear-gradient(180deg, rgba(31,41,64,0.5) 0%, rgba(20,27,45,1) 100%); }
body.dark-mode .kpi-card:hover { border-color: var(--blue); box-shadow: 0 0 20px rgba(0, 229, 255, 0.15); transform: translateY(-3px); }
body.dark-mode .kpi-card.blue::before { background: var(--blue); box-shadow: 0 0 15px var(--blue); }
body.dark-mode .kpi-card.green::before { background: var(--green); box-shadow: 0 0 15px var(--green); }
body.dark-mode .kpi-card.red::before { background: var(--red); box-shadow: 0 0 15px var(--red); }
body.dark-mode .kpi-card.amber::before { background: var(--amber); box-shadow: 0 0 15px var(--amber); }
body.dark-mode .kpi-card.purple::before { background: var(--purple); box-shadow: 0 0 15px var(--purple); }
body.dark-mode .kpi-card.teal::before { background: var(--teal); box-shadow: 0 0 15px var(--teal); }

.kpi-label{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:800;color:var(--navy);line-height:1;letter-spacing:-1px;margin-bottom:4px}
.kpi-sub{font-size:11px;color:var(--txt3)}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;margin-top:6px}
.kpi-topline{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.kpi-topline .kpi-label{margin-bottom:0}
.kpi-delta.up-good{background:var(--green-lt);color:var(--green)}
.kpi-delta.down-good{background:var(--green-lt);color:var(--green)}
.kpi-delta.up-bad{background:var(--red-lt);color:var(--red)}
.kpi-delta.down-bad{background:var(--red-lt);color:var(--red)}
.kpi-delta.neutral{background:var(--surface2);color:var(--txt3)}

/* ─── MODAL ─── */
.modal-overlay {
position: fixed; top: 0; left: 0; right: 0; bottom: 0;
background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px);
z-index: 9999; display: flex; align-items: center; justify-content: center;
opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-content {
background: var(--surface); border: 1px solid var(--border);
border-radius: var(--r); width: 95%; max-width: 1050px; max-height: 85vh;
display: flex; flex-direction: column; overflow: hidden;
box-shadow: var(--sh-lg); transform: translateY(20px); transition: transform 0.3s;
}
body.dark-mode .modal-content { box-shadow: 0 0 40px rgba(0, 229, 255, 0.15); border-color: var(--blue-md); }
.modal-overlay.active .modal-content { transform: translateY(0); }
.modal-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--surface2); }
.modal-title { font-size: 14px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.5px; }
body.dark-mode .modal-title { color: var(--blue); }
.modal-close { cursor: pointer; background: transparent; border: none; font-size: 24px; color: var(--txt3); line-height: 1; transition: color 0.2s; }
.modal-close:hover { color: var(--red); }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; background: var(--bg); }

/* ─── WEEK COMPARISON BAR ─── */
.compare-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:24px;box-shadow:var(--sh)}
.compare-bar h3{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px}
.compare-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px}
.compare-label{min-width:160px;color:var(--txt2);font-weight:500}
.compare-track{flex:1;background:var(--surface2);border-radius:6px;height:18px;overflow:hidden;position:relative}
.compare-fill-cur{height:100%;border-radius:6px;transition:width .8s cubic-bezier(.4,0,.2,1);position:absolute;top:0;left:0}
.compare-fill-prev{height:100%;border-radius:6px;opacity:.35;position:absolute;top:0;left:0}
.compare-vals{min-width:90px;text-align:right;font-size:11px;color:var(--txt2)}

/* ─── ATTRIBUTE EXPLORER (2 ROWS HORIZONTAL) ─── */
.attr-explorer{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-bottom:24px}
.attr-tabs{display:flex;background:var(--surface2);border-bottom:1px solid var(--border);overflow-x:auto}
.attr-tab{padding:10px 18px;font-size:12px;font-weight:500;cursor:pointer;color:var(--txt2);border:none;background:transparent;white-space:nowrap;font-family:inherit;border-bottom:2px solid transparent;transition:all .2s}
.attr-tab:hover{color:var(--navy);background:rgba(0,0,0,.02)}
.attr-tab.active{color:var(--blue-d);border-bottom-color:var(--blue-d);font-weight:700;background:var(--surface)}
body.dark-mode .attr-tab.active { color: var(--blue); border-bottom-color: var(--blue); text-shadow: 0 0 8px rgba(0,229,255,0.4); }
.attr-tab.rm-detail{box-shadow:inset 0 0 0 1px var(--border)}
.attr-tab.rm-detail.active{box-shadow:inset 0 0 0 1px var(--blue-md)}
.attr-body{padding:20px}

.attr-values {
display: grid;
grid-template-rows: repeat(2, 1fr);
grid-auto-flow: column;
grid-auto-columns: minmax(190px, 1fr);
gap: 12px;
margin-bottom: 20px;
overflow-x: auto;
padding-bottom: 12px;
}
.attr-values::-webkit-scrollbar { height: 8px; }
.attr-values::-webkit-scrollbar-track { background: var(--surface2); border-radius: 4px; }
.attr-values::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
body.dark-mode .attr-values::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
body.dark-mode .attr-values::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.2); }
body.dark-mode .attr-values::-webkit-scrollbar-thumb:hover { background: var(--blue); }

.attr-value-card{border:2px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;cursor:pointer;transition:all .2s;background:var(--surface); height: 100%; display: flex; flex-direction: column; justify-content: center;}
.attr-values{scroll-behavior:smooth}
.attr-value-card{will-change:transform}
.attr-value-card:hover{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-md)}
.attr-value-card.selected{border-color:var(--blue-d);background:var(--blue-lt);box-shadow:0 0 0 3px var(--blue-md)}

body.dark-mode .attr-value-card { background: rgba(31,41,64,0.3); }
body.dark-mode .attr-value-card:hover { border-color: var(--blue); box-shadow: 0 0 15px rgba(0,229,255,0.2); background: rgba(0,229,255,0.05); }
body.dark-mode .attr-value-card.selected { border-color: var(--blue); background: rgba(0,229,255,0.1); box-shadow: 0 0 15px rgba(0,229,255,0.3) inset, 0 0 15px rgba(0,229,255,0.2); }

.attr-value-name{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attr-value-count{font-size:22px;font-weight:800;color:var(--blue-d);letter-spacing:-1px}
body.dark-mode .attr-value-count { color: var(--blue); text-shadow: 0 0 8px rgba(0,229,255,0.3); }
.attr-value-pct{font-size:10px;color:var(--txt3);margin-top:4px}

/* ─── DRILL PANEL ─── */
.drill-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px 20px;animation:slideIn .2s ease}
body.dark-mode .drill-panel { border-color: var(--blue-md); box-shadow: 0 0 20px rgba(0,229,255,0.1) inset; background: rgba(31,41,64,0.2); }
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.drill-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.drill-title .chip{background:var(--blue-d);color:#fff;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
body.dark-mode .drill-title .chip { background: var(--blue); color: #000; box-shadow: 0 0 10px rgba(0,229,255,0.5); }
.drill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.drill-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;box-shadow:var(--sh);min-height:0;display:flex;flex-direction:column}
.drill-card h4{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.linked-records-shell{margin-top:4px;flex:1;min-height:0;display:flex;flex-direction:column}
.linked-records-toolbar{display:flex;justify-content:flex-end;margin-bottom:6px;flex-shrink:0}
.linked-records-scroll{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2)}
.drill-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--surface2);font-size:12px}
.drill-row:last-child{border-bottom:none}
.drill-row-label{color:var(--txt2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.drill-row-label.jumpable{cursor:pointer;color:var(--blue-d);font-weight:700}
body.dark-mode .drill-row-label.jumpable{color:var(--blue)}
.drill-row-bar{flex:1;margin:0 10px;background:var(--surface2);border-radius:3px;height:6px;overflow:hidden}
.drill-row-bar-fill{height:100%;border-radius:3px;background:var(--blue-d);opacity:.7}
body.dark-mode .drill-row-bar-fill { background: var(--blue); box-shadow: 0 0 8px rgba(0,229,255,0.8); opacity:1;}
.drill-row-val{font-weight:700;color:var(--navy);min-width:28px;text-align:right}
.mini-note{margin-top:12px;padding:10px 12px;border-left:3px solid var(--blue-d);background:var(--blue-lt);border-radius:0 var(--r-sm) var(--r-sm) 0;font-size:11px;color:var(--txt2);line-height:1.6}

</style>

<script>
// ================================================================
// STATE
// ================================================================
var S = {
calls:[], callTkts:[], whatsapp:[], careEmails:[],
dateFrom: null, dateTo: null,
prevFrom: null, prevTo: null,
charts: {},
attrTab: 'broker',
attrSelected: null,
aiRunning: false,
aiResult: null,
cacheBuiltAt: '',
channelTab: 'combined', // 'combined', 'calls', 'whatsapp'
modalMetricType: null,
modalAgentSelected: null,
rmLensSelection: null,
indiaStateSelection: null
};

// ================================================================
// INIT & THEME
// ================================================================
document.addEventListener('DOMContentLoaded', function() {
applyTheme(localStorage.getItem('theme') || 'light');

google.script.run
.withSuccessHandler(function(data) {
S.calls = data.calls ||[];
S.callTkts = data.callTkts ||[];
S.whatsapp = data.whatsapp ||[];
S.careEmails = data.careEmails ||[];
S.cacheBuiltAt = data.builtAt || '';

initWeek('thisweek');
document.getElementById('status-pill').textContent =
S.cacheBuiltAt ? 'Cache: ' + S.cacheBuiltAt : 'Live data';
})
.withFailureHandler(function(e) {
document.getElementById('page-root').innerHTML =
'<div class="loading"><div class="error-box">⚠️ Failed to load: ' + e.message + '<br>Please reload the page or Force Refresh from the main dashboard.</div></div>';
})
.getAllData();
});

function getTheme() {
if (document.body.classList.contains('dark-mode')) return 'dark';
return 'light';
}

function applyTheme(theme) {
var next = (theme === 'dark') ? theme : 'light';
document.body.classList.remove('dark-mode');
if (next === 'dark') document.body.classList.add('dark-mode');
localStorage.setItem('theme', next);
var btn = document.getElementById('theme-btn');
if (btn) {
var label = next === 'dark' ? 'Dark' : 'Light';
btn.textContent = '🌓 Theme: ' + label;
}
}

function toggleTheme() {
var order = ['light', 'dark'];
var cur = getTheme();
var next = order[(order.indexOf(cur) + 1) % order.length];
applyTheme(next);
render(); // redraw elements & charts with proper theme colors
}

function refreshAll() {
google.script.run
.withSuccessHandler(function() { location.reload(); })
.withFailureHandler(function(e) { alert('Refresh failed: ' + e.message); })
.forceRebuildCache();
}

function setChannel(ch) {
S.channelTab = ch;
S.attrSelected = null;
render();
}

// ================================================================
// DATE & TIME HELPERS
// ================================================================
function parseDate(v) {
if (!v) return null;
var today = new Date();
today.setHours(23,59,59,999);

if (typeof v === 'number') {
var dn = new Date(v);
return (!isNaN(dn) && dn.getFullYear() >= 2000 && dn <= today) ? dn : null;
}
var s = String(v).trim();
if (!s) return null;

if (/^\d{10,}$/.test(s)) {
var dn2 = new Date(parseInt(s, 10));
return (!isNaN(dn2) && dn2.getFullYear() >= 2000 && dn2 <= today) ? dn2 : null;
}
var m1 = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})/);
if (m1) {
var dm = new Date(+m1[3], +m1[2]-1, +m1[1]);
return (!isNaN(dm) && dm.getFullYear() >= 2000 && dm <= today) ? dm : null;
}
var m2 = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
if (m2) {
var dm2 = new Date(+m2[1], +m2[2]-1, +m2[3]);
return (!isNaN(dm2) && dm2.getFullYear() >= 2000 && dm2 <= today) ? dm2 : null;
}
return null;
}

function dStr(d) {
if (!d) return '';
return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function dLabel(d) {
if (!d) return '';
var months =['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
return d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
}
function pad(n){ return n<10?'0'+n:String(n); }
function addDays(d,n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function inRange(v, from, to) {
var d = parseDate(v);
if (!d) return false;
return dStr(d) >= dStr(from) && dStr(d) <= dStr(to);
}
function filterByDate(rows, col, from, to) {
return rows.filter(function(r){ return inRange(r[col], from, to); });
}

function getMonSunCycle(d) {
var r = new Date(d);
var day = r.getDay();
var diff = day === 0 ? 6 : day - 1;
r.setDate(r.getDate() - diff);
r.setHours(0,0,0,0);
var sun = new Date(r);
sun.setDate(sun.getDate() + 6);
sun.setHours(23,59,59,999);
return { mon: r, sun: sun };
}

function getLatestDate() {
var today = new Date(); today.setHours(0,0,0,0);
var max = null;
function chk(v) {
var d = parseDate(v);
if (d && d <= today && (!max || d > max)) max = d;
}
S.calls.forEach(function(r){ chk(r['Call Date']); });
S.callTkts.concat(S.whatsapp).concat(S.careEmails).forEach(function(r){ chk(r['Created date']); });
if (!max) max = today;
return max;
}

function getEarliestDate() {
var min = null;
function chk(v) {
var d = parseDate(v);
if (d && (!min || d < min)) min = d;
}
S.calls.forEach(function(r){ chk(r['Call Date']); });
S.callTkts.concat(S.whatsapp).concat(S.careEmails).forEach(function(r){ chk(r['Created date']); });
if (!min) {
min = new Date();
min.setHours(0,0,0,0);
}
return min;
}

function getAvailableWeeks() {
var latest = getLatestDate();
var earliest = getEarliestDate();
var latestCycle = getMonSunCycle(latest);
var earliestCycle = getMonSunCycle(earliest);
var weeks = [];
var curMon = new Date(earliestCycle.mon);
var i = 0;
while (curMon <= latestCycle.mon && i < 260) {
var curSun = addDays(curMon, 6);
curSun.setHours(23,59,59,999);
weeks.push({ index: i, from: new Date(curMon), to: curSun, name: 'Week ' + (i + 1) });
curMon = addDays(curMon, 7);
i++;
}
return weeks;
}

function initWeek(preset) {
var back = 0;
if (preset === 'lastweek') back = 1;
if (preset === '2weeksago') back = 2;
var weeks = getAvailableWeeks();
if (!weeks.length) return;
var idx = Math.max(0, weeks.length - 1 - back);
var pick = weeks[idx];
S.dateFrom = new Date(pick.from);
S.dateTo = new Date(pick.to);

S.prevFrom = addDays(S.dateFrom, -7);
S.prevTo = addDays(S.dateTo, -7);

var df = document.getElementById('df-week');
var dt = document.getElementById('dt-week');
if (df) df.value = dStr(S.dateFrom);
if (dt) dt.value = dStr(S.dateTo);

S.attrSelected = null; S.aiResult = null;
render();
}

function applyCustomWeek() {
var df = document.getElementById('df-week').value;
var dt = document.getElementById('dt-week').value;
if (!df || !dt) return;
var d1 = new Date(df);
var d2 = new Date(dt);
if(isNaN(d1) || isNaN(d2)) return;
d1.setHours(0,0,0,0);
d2.setHours(23,59,59,999);
var diffDays = Math.ceil( (d2.getTime() - d1.getTime()) / (1000*60*60*24) );

S.dateFrom = d1; S.dateTo = d2;
S.prevFrom = addDays(d1, -diffDays); S.prevTo = addDays(d2, -diffDays);
S.attrSelected = null; S.aiResult = null;
render();
}

function timeStrToMins(t) {
if (t === undefined || t === null || t === '') return 0;
if (typeof t === 'number') {
if (t < 1 && t > 0) return t * 24 * 60;
return t / 60;
}
var s = String(t).trim();

var m3 = s.match(/(\d+):(\d{1,2}):(\d{2}):(\d{2})/);
if (m3) return parseInt(m3[1])*24*60 + parseInt(m3[2])*60 + parseInt(m3[3]) + parseInt(m3[4])/60;
var m = s.match(/(\d{1,2}):(\d{2}):(\d{2})/);
if (m) return parseInt(m[1])*60 + parseInt(m[2]) + parseInt(m[3])/60;
var m2 = s.match(/(\d{1,2}):(\d{2})/);
if (m2) return parseInt(m2[1]) + parseInt(m2[2])/60;
var hm = s.match(/(\d+)\s*[hH]\s*(\d+)\s*[mM]/);
if (hm) return parseInt(hm[1])*60 + parseInt(hm[2]);
var mm = s.match(/^(\d+)\s*[mM]$/);
if (mm) return parseInt(mm[1]);
var ss = s.match(/^(\d+)\s*[sS]$/);
if (ss) return parseInt(ss[1])/60;
if (!isNaN(s) && s !== '') {
var num = parseFloat(s);
if (num < 1 && num > 0) return num * 24 * 60;
return num / 60;
}
return 0;
}

function getFirstValidTime(r, fields) {
for (var i=0; i<fields.length; i++) {
var val = r[fields[i]];
if (val !== undefined && val !== null && val !== '') {
var m = timeStrToMins(val);
if (m > 0) return m;
}
}
return 0;
}

function normalizeMissing(v) {
var s = String(v == null ? '' : v).trim();
if (!s) return 'NA';
if (/^(na|n\/a|null|undefined|-|not available)$/i.test(s)) return 'NA';
return s;
}

function hasValue(v) {
return normalizeMissing(v) !== 'NA';
}

function normalizeCaseInsensitiveLabel(v) {
var s = normalizeMissing(v);
if (s === 'NA') return 'NA';
s = s.replace(/[._-]/g, ' ');
s = s.replace(/\s+/g, ' ').trim().toLowerCase();
while (/\b([a-z])\s+([a-z])\b/.test(s)) {
s = s.replace(/\b([a-z])\s+([a-z])\b/g, '$1$2');
}
return s.replace(/\b[a-z]/g, function(ch){ return ch.toUpperCase(); });
}

function getDevRevOwnerName(r) {
var owner = normalizeMissing(r['Owners[0]'] || r['Owner[0]'] || r['Owner'] || r['owned_by']);
return owner === 'NA' ? 'AI - Agent' : owner;
}

function getCallAgentName(r) {
return normalizeMissing(r['Agent'] || r['Agent Name'] || r['RM Name'] || r['Receiver']) === 'NA'
? 'Unassigned'
: normalizeMissing(r['Agent'] || r['Agent Name'] || r['RM Name'] || r['Receiver']);
}

function getAttrValue(r, attr) {
if (attr && attr.key === 'rm') return getRmValue(r);
if (attr && attr.key === 'branch') return getBranchValue(r);
if (attr && attr.key === 'issue') return getIssueValue(r);
if (attr && attr.key === 'subissue') return getSubIssueValue(r);
if (attr && attr.key === 'broker') return getBrokerValue(r);
if (attr && attr.key === 'channel') return getChannelValue(r);
var primary = normalizeMissing(r[attr.field]);
if (primary !== 'NA') return primary;
if (attr.fallback) {
var fallback = normalizeMissing(r[attr.fallback]);
if (fallback !== 'NA') return fallback;
}
return 'NA';
}

function getIssueValue(r) {
var v = normalizeMissing(r['Issue Type (B2B)'] || r['Subtype'] || r['Issue'] || r['Category']);
return /^general$/i.test(v) ? 'NA' : v;
}

function getSubIssueValue(r) {
var v = normalizeMissing(r['Sub Issue Type (B2B)'] || r['Sub-Issue']);
return /^general$/i.test(v) ? 'NA' : v;
}

function getBrokerValue(r) {
return normalizeMissing(r['RM Broker Name'] || r['Broker Name[0]'] || r['Broker ID (B2B)'] || r['Broker ID']);
}

function getRmValue(r) {
return normalizeCaseInsensitiveLabel(r['RM Name']);
}

function getBranchValue(r) {
return normalizeCaseInsensitiveLabel(r['Branch/Location']);
}

function shouldExcludeMetricsRow(r) {
return getIssueValue(r) === 'NA' || getSubIssueValue(r) === 'NA' || getBranchValue(r) === 'NA';
}

function filterMetricsRows(rows) {
return rows.filter(function(r){ return !shouldExcludeMetricsRow(r); });
}

function getChannelValue(r) {
return normalizeMissing(r['Channel (B2B)']);
}

function getBrokerIdValue(r) {
return normalizeMissing(r['Broker ID (B2B)'] || r['Broker ID']);
}

function getRecordDateKey(r) {
var d = parseDate(r['Created date'] || r['Call Date']);
return d ? dStr(d) : 'Unknown';
}

function uniqueDayCount(rows, dateField) {
var seen = {};
rows.forEach(function(r) {
var d = parseDate(r[dateField]);
if (d) seen[dStr(d)] = true;
});
return Math.max(1, Object.keys(seen).length);
}

function getMonthlyRanges() {
var monthMap = {};
function mark(v) {
var d = parseDate(v);
if (!d) return;
var k = d.getFullYear() + '-' + pad(d.getMonth() + 1);
if (!monthMap[k]) {
var start = new Date(d.getFullYear(), d.getMonth(), 1);
var end = new Date(d.getFullYear(), d.getMonth() + 1, 0);
end.setHours(23,59,59,999);
monthMap[k] = { key: k, start: start, end: end };
}
}
S.calls.forEach(function(r){ mark(r['Call Date']); });
S.callTkts.concat(S.whatsapp).concat(S.careEmails).forEach(function(r){ mark(r['Created date']); });
return Object.keys(monthMap).sort(function(a,b){ return b.localeCompare(a); }).map(function(k){ return monthMap[k]; });
}

function setMonthRange(key) {
var ranges = getMonthlyRanges();
var target = null;
for (var i = 0; i < ranges.length; i++) {
if (ranges[i].key === key) { target = ranges[i]; break; }
}
if (!target) return;
var start = new Date(target.start);
var end = new Date(target.end);
var prevStart = new Date(start.getFullYear(), start.getMonth() - 1, 1);
var prevEnd = new Date(start.getFullYear(), start.getMonth(), 0);
prevEnd.setHours(23,59,59,999);
S.dateFrom = start;
S.dateTo = end;
S.prevFrom = prevStart;
S.prevTo = prevEnd;
S.attrSelected = null;
S.aiResult = null;
render();
}

function renderRMOpsLens(rows, prevRows) {
if (!rows.length) return '';

function deltaText(cur, prev) {
if (!prev) return '<span style="color:var(--txt3)">new</span>';
var chg = Math.round(((cur - prev) / prev) * 100);
if (chg === 0) return '<span style="color:var(--txt3)">flat</span>';

}

function byKey(rowsIn, keyFn) {
var m = {};
rowsIn.forEach(function(r){
var k = keyFn(r);
m[k] = (m[k] || 0) + 1;
});
return m;
}

var rmNow = byKey(rows, getRmValue);
var rmPrev = byKey(prevRows, getRmValue);
var brokerNow = byKey(rows, getBrokerValue);
var branchNow = byKey(rows, getBranchValue);
var issueNow = byKey(rows, getIssueValue);

var rmCount = Object.keys(rmNow).filter(function(k){ return k !== 'NA'; }).length;
var brokerCount = Object.keys(brokerNow).filter(function(k){ return k !== 'NA'; }).length;

var rmBranchSubIssue = {};
var repeat7 = {};

rows.forEach(function(r){
var rm = getRmValue(r), broker = getBrokerValue(r), issue = getIssueValue(r), sub = getSubIssueValue(r), branch = getBranchValue(r);
var mixKey = rm + '||' + branch + '||' + sub;

var d = parseDate(r['Created date']);
if (d && rm !== 'NA' && broker !== 'NA' && issue !== 'NA') {
var repKey = rm + '||' + broker + '||' + branch + '||' + issue;
if (!repeat7[repKey]) repeat7[repKey] = [];
repeat7[repKey].push(d);
}
});

var loopRows = [];
Object.keys(repeat7).forEach(function(k){
var arr = repeat7[k].sort(function(a,b){ return a - b; });
var c = 0;
for (var i = 1; i < arr.length; i++) {

loopRows.push({ rm:p[0], broker:p[1], branch:p[2], issue:p[3], repeats:c });

'<div class="kpi-card amber" onclick="openRMLensMetricModal(\'loops\')"><div class="kpi-topline"><div class="kpi-label">Repeat 7-day Loops</div><span class="deepdive-indicator">Deepdive</span></div><div class="kpi-value">'+loopRows.length+'</div><div class="kpi-sub">RM+Broker+Issue repeated within 7 days</div></div>' +

h += '<div class="issue-grid">';

}
h += renderRMOpsDeepDive(rows);
return h;
}

// ================================================================
// KPI CARDS & CALCULATION
// ================================================================
function pct(a,b){ return b ? Math.round(a/b*1000)/10 : 0; }
function avg(arr){ return arr.length ? arr.reduce(function(a,b){return a+b},0)/arr.length : 0; }
function fmt1(n){ return Math.round((Number(n) || 0) * 10) / 10; }

function minsToHMS(m) {
if (!m || isNaN(m)) return '-';
var s = Math.round(m*60);
if (s<60) return s+'s';
if (s<3600) return Math.floor(s/60)+'m '+pad(s%60)+'s';
return Math.floor(s/3600)+'h '+pad(Math.floor((s%3600)/60))+'m';
}

function delta(cur,prev,lowerBetter) {
if (!prev || prev===0) return '<span class="kpi-delta neutral">— no prev data</span>';
var p = Math.round((cur-prev)/prev*100);
if (p===0) return '<span class="kpi-delta neutral">— same as prev</span>';
var good = lowerBetter ? p<0 : p>0;
var cls = (p>0 ? 'up' : 'down') + (good ? '-good' : '-bad');
return '<span class="kpi-delta '+cls+'">'+(p>0?'↑':'↓')+' '+Math.abs(p)+'% vs prev</span>';
}

function renderCallKPIs(callRows, prevCallRows, waRows, prevWaRows) {
var ib = callRows.filter(function(r){ return r['Call Type']==='Inbound'; });
var ibAns = ib.filter(function(r){ return r['Status']==='Answered'; });
var ibMiss = ib.filter(function(r){ return r['Status']==='Unanswered'; });
var pg = callRows.filter(function(r){ return r['Call Type']==='Progressive'; });
var pgAns = pg.filter(function(r){ return r['Status']==='Answered'; });
var prevIb = prevCallRows.filter(function(r){ return r['Call Type']==='Inbound'; });

var ahtArr = ibAns.map(function(r){ return timeStrToMins(r['Duration']); }).filter(function(v){return v>0;});
var prevAhtArr = prevIb.filter(function(r){ return r['Status']==='Answered'; }).map(function(r){ return timeStrToMins(r['Duration']); }).filter(function(v){return v>0;});

var waAvgFields =['Average response time', 'First response time', 'Response time', 'Avg time', 'Handling time', 'AHT', 'Avg Time', 'Average Time', 'FRT'];
var waResFields = ['Resolution time', 'Time to resolve', 'Resolution Time', 'Resolution'];

var waAvgTimeArr = waRows.map(function(r){ return getFirstValidTime(r, waAvgFields); }).filter(function(v){return v>0;});
var waResTimeArr = waRows.map(function(r){ return getFirstValidTime(r, waResFields); }).filter(function(v){return v>0;});

var prevWaAvgTimeArr = prevWaRows.map(function(r){ return getFirstValidTime(r, waAvgFields); }).filter(function(v){return v>0;});
var prevWaResTimeArr = prevWaRows.map(function(r){ return getFirstValidTime(r, waResFields); }).filter(function(v){return v>0;});

var h = '<div class="sec-head">📞 Key Metrics <span style="font-size:10px;color:var(--txt3);margin-left:12px;">Every card supports deepdive</span></div>';

if (S.channelTab === 'whatsapp') {
h += '<div class="kpi-grid c4">';
} else if (S.channelTab === 'calls') {
h += '<div class="kpi-grid c5">';
} else {
h += '<div class="kpi-grid c4">';
}

if (S.channelTab === 'combined') {
var totCur = ib.length + waRows.length;
var totPrev = prevIb.length + prevWaRows.length;
h += kpi('Total Interactions','purple', totCur, delta(totCur,totPrev,false), 'all');
h += kpi('Inbound Calls','blue', ib.length, delta(ib.length,prevIb.length,false), 'inbound');
h += kpi('WhatsApp Chats','teal', waRows.length, delta(waRows.length,prevWaRows.length,false), 'whatsapp');
h += kpi('Answered Calls','green', ibAns.length, pct(ibAns.length,ib.length||1)+'% ans rate', 'answered');
h += kpi('Missed Calls','red', ibMiss.length, pct(ibMiss.length,ib.length||1)+'% miss rate', 'missed');
h += kpi('Avg WA Response','amber', minsToHMS(avg(waAvgTimeArr)), delta(avg(waAvgTimeArr), avg(prevWaAvgTimeArr), true), 'whatsapp');
h += kpi('Avg WA Resolution','blue', minsToHMS(avg(waResTimeArr)), delta(avg(waResTimeArr), avg(prevWaResTimeArr), true), 'whatsapp');
} else if (S.channelTab === 'calls') {
h += kpi('Total Inbound','blue', ib.length, delta(ib.length,prevIb.length,false), 'inbound');
h += kpi('Answered','green', ibAns.length, pct(ibAns.length,ib.length||1)+'% ans rate', 'answered');
h += kpi('Missed (Unans)','red', ibMiss.length, pct(ibMiss.length,ib.length||1)+'% miss rate', 'missed');
h += kpi('Progressive Attempted','purple', pg.length, pgAns.length+' answered ('+pct(pgAns.length,pg.length||1)+'%)', 'progressive');
h += kpi('Avg Call AHT','teal', minsToHMS(avg(ahtArr)), delta(avg(ahtArr),avg(prevAhtArr),true), 'aht');
} else if (S.channelTab === 'whatsapp') {
h += kpi('Total WhatsApp Chats','teal', waRows.length, delta(waRows.length,prevWaRows.length,false), 'whatsapp');
var uniqueRMs = new Set(waRows.map(function(r){return r['RM Name'];}).filter(Boolean)).size;
var prevUniqueRMs = new Set(prevWaRows.map(function(r){return r['RM Name'];}).filter(Boolean)).size;
h += kpi('Unique RMs Assisted','purple', uniqueRMs, delta(uniqueRMs, prevUniqueRMs, false), 'whatsapp');
h += kpi('Avg Response Time','amber', minsToHMS(avg(waAvgTimeArr)), delta(avg(waAvgTimeArr), avg(prevWaAvgTimeArr), true), 'whatsapp');
h += kpi('Avg Resolution Time','blue', minsToHMS(avg(waResTimeArr)), delta(avg(waResTimeArr), avg(prevWaResTimeArr), true), 'whatsapp');
}

h += '</div>';
return h;
}

// ================================================================
function computeAgentStats(callRows, waRows) {
var agents = {};

function getAg(name) {
var ag = String(name || '(Unassigned)').trim();
if (!agents[ag]) agents[ag] = {
ib:0, ans:0, miss:0, ahtSum:0, ahtCount:0,
wa:0, waAvgSum:0, waAvgCount:0, waResSum:0, waResCount:0, pg:0
};
return agents[ag];
}

if (callRows) {
callRows.forEach(function(r) {
var agentName = getCallAgentName(r);
var ag = getAg(agentName);
if (r['Call Type'] === 'Inbound') {
ag.ib++;
if (r['Status'] === 'Answered') {
ag.ans++;
var dur = timeStrToMins(r['Duration']);
if (dur > 0) { ag.ahtSum += dur; ag.ahtCount++; }
} else {
ag.miss++;
}
} else if (r['Call Type'] === 'Progressive') {
ag.pg++;
}
});
}

if (waRows) {
var waAvgFields =['Average response time', 'First response time', 'Response time', 'Avg time', 'Handling time', 'AHT', 'Avg Time', 'Average Time', 'FRT'];
var waResFields =['Resolution time', 'Time to resolve', 'Resolution Time', 'Resolution'];

waRows.forEach(function(r) {
var agentName = getDevRevOwnerName(r);
var ag = getAg(agentName);
ag.wa++;

var avgT = getFirstValidTime(r, waAvgFields);
if (avgT > 0) { ag.waAvgSum += avgT; ag.waAvgCount++; }

var resT = getFirstValidTime(r, waResFields);
if (resT > 0) { ag.waResSum += resT; ag.waResCount++; }
});
}

return agents;
}

 h += '<div class="issue-panel" style="margin-top:12px"><div class="issue-panel-head"><h3>Linked Ticket/Conversation Records</h3></div><div class="issue-panel-body">' + renderLinkedRecordTable(rows, true) + '</div></div>';
} else if (mode === 'brokers') {
var brokerMap = {};
rows.forEach(function(r){
var broker = getBrokerValue(r);
if (broker === 'NA') return;
brokerMap[broker] = (brokerMap[broker] || 0) + 1;
});
var rankedBrokers = Object.keys(brokerMap).sort(function(a,b){ return brokerMap[b] - brokerMap[a]; });
h += '<div class="issue-panel"><div class="issue-panel-head"><h3>Brokers sorted by most contacted</h3></div><div class="issue-panel-body">';
rankedBrokers.slice(0, 50).forEach(function(k){
h += '<div class="issue-row"><div><div class="issue-row-label">'+renderRMLensJump(k, 'broker', k)+'</div></div><div class="issue-row-count">'+brokerMap[k]+'</div><div></div></div>';
});
h += '</div></div>';
 h += '<div class="issue-panel" style="margin-top:12px"><div class="issue-panel-head"><h3>Linked Ticket/Conversation Records</h3></div><div class="issue-panel-body">' + renderLinkedRecordTable(rows, true) + '</div></div>';
} else if (mode === 'branches') {
var branchMap = {};
rows.forEach(function(r){
var branch = getBranchValue(r);
if (branch === 'NA') return;
branchMap[branch] = (branchMap[branch] || 0) + 1;
});
var rankedBranches = Object.keys(branchMap).sort(function(a,b){ return branchMap[b] - branchMap[a]; });
h += '<div class="issue-panel"><div class="issue-panel-head"><h3>Branches sorted by query volume</h3></div><div class="issue-panel-body">';
rankedBranches.slice(0, 50).forEach(function(k){
h += '<div class="issue-row"><div><div class="issue-row-label">'+renderRMLensJump(k, 'branch', k)+'</div></div><div class="issue-row-count">'+branchMap[k]+'</div><div></div></div>';
});
h += '</div></div>';
 h += '<div class="issue-panel" style="margin-top:12px"><div class="issue-panel-head"><h3>Linked Ticket/Conversation Records</h3></div><div class="issue-panel-body">' + renderLinkedRecordTable(rows, true) + '</div></div>';
} else if (mode === 'loops') {
var repeat7 = {};
rows.forEach(function(r){
var rm = getRmValue(r), broker = getBrokerValue(r), branch = getBranchValue(r), issue = getIssueValue(r);
var d = parseDate(r['Created date']);
if (d && rm !== 'NA' && broker !== 'NA' && issue !== 'NA') {
var repKey = rm + '||' + broker + '||' + branch + '||' + issue;
if (!repeat7[repKey]) repeat7[repKey] = [];
repeat7[repKey].push(d);
}
});
var loopRows = [];
Object.keys(repeat7).forEach(function(k){
var arr = repeat7[k].sort(function(a,b){ return a - b; });
var c = 0;
for (var i = 1; i < arr.length; i++) if ((arr[i] - arr[i-1]) / 86400000 <= 7) c++;
if (c > 0) {
var p = k.split('||');
loopRows.push({ rm:p[0], broker:p[1], branch:p[2], issue:p[3], repeats:c });
}
});
loopRows.sort(function(a,b){ return b.repeats - a.repeats; });
h += '<div class="issue-panel"><div class="issue-panel-head"><h3>RM + Broker + Branch loops (sorted)</h3></div><div class="issue-panel-body">';
if (!loopRows.length) {
h += '<div class="mini-note">No repeat loops in this period.</div>';
} else {
loopRows.slice(0, 50).forEach(function(r){
h += '<div class="issue-row"><div><div class="issue-row-label">'+renderRMLensJump(r.rm, 'rm', r.rm)+' '+renderRMLensJump(r.broker, 'broker', r.broker, true)+'</div><div class="issue-row-meta">'+renderRMLensJump(r.branch, 'branch', r.branch, true)+' '+renderRMLensJump(r.issue, 'issue', r.issue, true)+'</div></div><div class="issue-row-count">'+r.repeats+'</div><div></div></div>';
});
}
h += '</div></div>';
 h += '<div class="issue-panel" style="margin-top:12px"><div class="issue-panel-head"><h3>Linked Ticket/Conversation Records</h3></div><div class="issue-panel-body">' + renderLinkedRecordTable(rows, true) + '</div></div>';
}
return h;
}

function renderAgentModalData(callRows, waRows, metricType) {
var agents = computeAgentStats(callRows, waRows);
var isCall = ['inbound', 'answered', 'missed', 'progressive', 'aht'].indexOf(metricType) !== -1;
var isWa = metricType === 'whatsapp';

var mode = 'combined';
if (metricType === 'progressive') mode = 'progressive';
else if (isCall) mode = 'calls';
else if (isWa) mode = 'whatsapp';

var sorted = Object.keys(agents).sort(function(a,b) {
var da = agents[a], db = agents[b];
if (metricType === 'inbound') return (db.ib) - (da.ib);
if (metricType === 'answered') return (db.ans) - (da.ans) || (db.ib - da.ib);
if (metricType === 'missed') return (db.miss) - (da.miss) || (db.ib - da.ib);
if (metricType === 'progressive') return (db.pg) - (da.pg);
if (metricType === 'aht') return (db.ahtCount ? db.ahtSum/db.ahtCount : 0) - (da.ahtCount ? da.ahtSum/da.ahtCount : 0);
if (metricType === 'whatsapp') return (db.wa) - (da.wa);
return (db.ib + db.wa) - (da.ib + da.wa);
});

var h = '<div class="tbl-card" style="margin-bottom:0; box-shadow:none; border:none;"><div class="tbl-wrap"><table>';

if (mode === 'whatsapp') {
h += '<thead><tr><th>Agent</th><th>WhatsApp Chats</th><th>Avg Resp Time</th><th>Avg Res Time</th></tr></thead><tbody>';
} else if (mode === 'progressive') {
h += '<thead><tr><th>Agent</th><th>Progressive Calls</th></tr></thead><tbody>';
} else if (mode === 'calls') {
h += '<thead><tr><th>Agent</th><th>Total Inbound</th><th>Answered</th><th>Missed</th><th>Answer Rate</th><th>Avg AHT</th></tr></thead><tbody>';
} else {
h += '<thead><tr><th>Agent</th><th>Total Interactions</th><th>Inbound</th><th>Ans</th><th>Miss</th><th>Ans Rate</th><th>Avg AHT</th><th>WA Chats</th><th>WA Avg Resp</th><th>WA Avg Res</th></tr></thead><tbody>';
}

var highlight = function(val, isTarget) { return isTarget ? '<strong style="color:var(--blue)">'+val+'</strong>' : val; };
var rowsRendered = 0;

sorted.forEach(function(ag) {
var d = agents[ag];
var tot = d.ib + d.wa;
if (metricType === 'inbound' && d.ib === 0) return;
if (metricType === 'answered' && d.ans === 0) return;
if (metricType === 'missed' && d.miss === 0) return;
if (metricType === 'progressive' && d.pg === 0) return;
if (metricType === 'whatsapp' && d.wa === 0) return;
if (metricType === 'aht' && d.ans === 0) return;
if (metricType === 'all' && tot === 0 && d.pg === 0) return;

rowsRendered++;
var rate = pct(d.ans, d.ib);
var aht = d.ahtCount ? minsToHMS(d.ahtSum / d.ahtCount) : '-';
var rateColor = rate >= 80 ? 'var(--green)' : (rate >= 50 ? 'var(--amber)' : 'var(--red)');
var agentCell = '<button class="agent-link" onclick="selectMetricAgent(\'' + escAttr(ag) + '\')">' + escHtml(ag) + '</button><div style="margin-top:6px"><span class="deepdive-indicator">Details</span></div>';

h += '<tr>';
h += '<td>' + agentCell + '</td>';

if (mode === 'whatsapp') {
h += '<td>'+highlight(d.wa, true)+'</td>';
h += '<td><span style="font-family:monospace;font-size:11px;">'+(d.waAvgCount ? minsToHMS(d.waAvgSum/d.waAvgCount) : '-')+'</span></td>';
h += '<td><span style="font-family:monospace;font-size:11px;">'+(d.waResCount ? minsToHMS(d.waResSum/d.waResCount) : '-')+'</span></td>';
} else if (mode === 'progressive') {
h += '<td>'+highlight(d.pg, true)+'</td>';
} else if (mode === 'calls') {
h += '<td>'+highlight(d.ib, metricType==='inbound')+'</td>';
h += '<td><span class="badge badge-green" style="background:var(--green-lt); color:var(--green);">'+highlight(d.ans, metricType==='answered')+'</span></td>';
h += '<td><span class="badge badge-red" style="background:var(--red-lt); color:var(--red);">'+highlight(d.miss, metricType==='missed')+'</span></td>';
h += '<td><div style="display:flex;align-items:center;gap:6px"><div style="flex:1;background:var(--surface2);height:6px;border-radius:3px;min-width:60px;overflow:hidden;"><div style="width:'+rate+'%;background:'+rateColor+';height:100%;border-radius:3px;"></div></div><span style="min-width:40px;text-align:right;font-size:11px;font-weight:700;color:var(--txt)">'+rate+'%</span></div></td>';
h += '<td><span style="font-family:monospace;font-size:11px;">'+highlight(aht, metricType==='aht')+'</span></td>';
} else {
h += '<td>'+highlight(tot, metricType==='all')+'</td>';
h += '<td>'+highlight(d.ib, metricType==='inbound')+'</td>';
h += '<td><span class="badge badge-green" style="background:var(--green-lt); color:var(--green);">'+highlight(d.ans, metricType==='answered')+'</span></td>';
h += '<td><span class="badge badge-red" style="background:var(--red-lt); color:var(--red);">'+highlight(d.miss, metricType==='missed')+'</span></td>';
h += '<td><div style="display:flex;align-items:center;gap:6px"><div style="flex:1;background:var(--surface2);height:6px;border-radius:3px;min-width:60px;overflow:hidden;"><div style="width:'+rate+'%;background:'+rateColor+';height:100%;border-radius:3px;"></div></div><span style="min-width:40px;text-align:right;font-size:11px;font-weight:700;color:var(--txt)">'+rate+'%</span></div></td>';
h += '<td><span style="font-family:monospace;font-size:11px;">'+highlight(aht, metricType==='aht')+'</span></td>';
h += '<td><span class="badge badge-blue" style="background:var(--teal-lt); color:var(--teal);">'+highlight(d.wa, metricType==='whatsapp')+'</span></td>';
h += '<td><span style="font-family:monospace;font-size:11px;">'+(d.waAvgCount ? minsToHMS(d.waAvgSum/d.waAvgCount) : '-')+'</span></td>';
h += '<td><span style="font-family:monospace;font-size:11px;">'+(d.waResCount ? minsToHMS(d.waResSum/d.waResCount) : '-')+'</span></td>';
}
h += '</tr>';
});

if(rowsRendered === 0) {
var colSpan = mode==='whatsapp'?4 : (mode==='progressive'?2 : (mode==='calls'?6:10));
h += '<tr><td colspan="'+colSpan+'" style="text-align:center; padding: 20px; color: var(--txt3);">No data found for this selection.</td></tr>';
}

h += '</tbody></table></div></div>';
if (S.modalAgentSelected) {
h += renderAgentUpdateDetail(S.modalAgentSelected, metricType);
}
return h;
}

function renderWeekComparison(callRows, prevCallRows, ctRows, prevCtRows, waRows, prevWaRows) {
var metrics =[];

if (S.channelTab === 'combined' || S.channelTab === 'calls') {
metrics.push({ label:'Inbound Calls', cur: callRows.filter(function(r){return r['Call Type']==='Inbound';}).length, prev: prevCallRows.filter(function(r){return r['Call Type']==='Inbound';}).length, color:'#3b82f6' });
metrics.push({ label:'Calls Answered', cur: callRows.filter(function(r){return r['Status']==='Answered'&&r['Call Type']==='Inbound';}).length, prev: prevCallRows.filter(function(r){return r['Status']==='Answered'&&r['Call Type']==='Inbound';}).length, color:'#10b981' });
metrics.push({ label:'Calls Missed', cur: callRows.filter(function(r){return r['Status']==='Unanswered'&&r['Call Type']==='Inbound';}).length, prev: prevCallRows.filter(function(r){return r['Status']==='Unanswered'&&r['Call Type']==='Inbound';}).length, color:'#ef4444' });
metrics.push({ label:'Progressive Calls',cur: callRows.filter(function(r){return r['Call Type']==='Progressive';}).length, prev: prevCallRows.filter(function(r){return r['Call Type']==='Progressive';}).length, color:'#8b5cf6' });
}

if (S.channelTab === 'combined' || S.channelTab === 'whatsapp') {
metrics.push({ label:'WhatsApp Chats', cur: waRows.length, prev: prevWaRows.length, color:'#0d9488' });
}

if(metrics.length === 0) return '';

var maxVal = Math.max.apply(null, metrics.map(function(m){ return Math.max(m.cur,m.prev); })) || 1;

var h = '<div class="compare-bar">';
h += '<h3>Week-on-Week Comparison &nbsp;<span style="font-size:11px;font-weight:500;color:var(--txt3)">■ Current vs &nbsp; <span style="opacity:.4">■ Previous Period</span></span></h3>';

metrics.forEach(function(m) {
var curW = Math.round(m.cur/maxVal*100);
var prevW = Math.round(m.prev/maxVal*100);
var chg = m.prev ? Math.round((m.cur-m.prev)/m.prev*100) : null;
var chgHtml = chg !== null
? '<span style="font-size:11px;font-weight:700;color:'+(chg>=0?'var(--green)':'var(--red)')+'">'+(chg>=0?'+':'')+chg+'%</span>'
: '<span style="font-size:11px;color:var(--txt3)">new</span>';

h += '<div class="compare-row">';
h += '<div class="compare-label">'+m.label+'</div>';
h += '<div class="compare-track">' +
'<div class="compare-fill-prev" style="width:'+prevW+'%;background:'+m.color+'"></div>' +
'<div class="compare-fill-cur" style="width:'+curW+'%;background:'+m.color+'"></div>' +
'</div>';
h += '<div class="compare-vals">'+m.cur+' &nbsp;'+chgHtml+'</div>';
h += '</div>';
});
h += '</div>';
return h;
}

function drawCharts(callRows, prevCallRows, waRows) {
var theme = getTheme();
var isDark = theme === 'dark';
var gridC = isDark ? 'rgba(255,255,255,0.05)' : '#f1f5f9';
var tickC = isDark ? '#94a3b8' : '#64748b';

var cColor1 = isDark ? '#00e5ff' : '#3b82f6';
var cColor2 = isDark ? '#00ffaa' : '#10b981';

var byDay = {};

if (S.channelTab === 'combined' || S.channelTab === 'calls') {
callRows.forEach(function(r) {
if (r['Call Type']!=='Inbound') return;
var d = (String(r['Call Date']||'').substring(0,10)).replace(/^\d{4}-/,'');
if (!byDay[d]) byDay[d] = {calls:0, ans:0, wa:0};
byDay[d].calls++;
if (r['Status']==='Answered') byDay[d].ans++;
});
}
if (S.channelTab === 'combined' || S.channelTab === 'whatsapp') {
waRows.forEach(function(r) {
var dtStr = String(r['Created date']||'');
var p = parseDate(dtStr);
if (p) {
var d = dStr(p).replace(/^\d{4}-/,'');
if (!byDay[d]) byDay[d] = {calls:0, ans:0, wa:0};
byDay[d].wa++;
}
});
}

var days = Object.keys(byDay).sort();
var volEl = document.getElementById('ch-daily-vol');
if (volEl) {
var datasets =[];
if (S.channelTab === 'combined') {
datasets.push({ label:'Inbound Calls', data: days.map(function(d){return byDay[d].calls;}), backgroundColor: isDark ? 'rgba(0,229,255,0.2)' : 'rgba(59,130,246,.2)', borderColor: cColor1, borderWidth:1.5 });
datasets.push({ label:'WhatsApp', data: days.map(function(d){return byDay[d].wa;}), backgroundColor: isDark ? 'rgba(0,255,170,0.2)' : 'rgba(16,185,129,.2)', borderColor: cColor2, borderWidth:1.5 });
} else if (S.channelTab === 'calls') {
datasets.push({ label:'Inbound', data: days.map(function(d){return byDay[d].calls;}), backgroundColor: isDark ? 'rgba(0,229,255,0.2)' : 'rgba(59,130,246,.2)', borderColor: cColor1, borderWidth:1.5 });
datasets.push({ type:'line', label:'Answered', data: days.map(function(d){return byDay[d].ans;}), borderColor: cColor2, backgroundColor: isDark ? 'rgba(0,255,170,0.1)' : '#10b98115', tension:.3, fill:true, pointRadius:3 });
} else {
datasets.push({ label:'WhatsApp Chats', data: days.map(function(d){return byDay[d].wa;}), backgroundColor: isDark ? 'rgba(0,255,170,0.2)' : 'rgba(16,185,129,.2)', borderColor: cColor2, borderWidth:1.5 });
}

S.charts['daily-vol'] = new Chart(volEl, {
type: 'bar',
data: { labels: days, datasets: datasets },
options: { responsive:true, maintainAspectRatio:true, plugins:{legend:{labels:{color:tickC, font:{size:10,family:'Inter'},boxWidth:10}}}, scales:{x:{ticks:{color:tickC, font:{size:9}},grid:{display:false}},y:{ticks:{color:tickC, font:{size:9}},grid:{color:gridC}}} }
});
}

if (S.channelTab !== 'whatsapp') {
var byHour = {};
for (var h=0;h<24;h++) byHour[h]=0;
var activeCallDays = {};
callRows.forEach(function(r) {
if (r['Call Type']!=='Inbound') return;
var t = String(r['Start Time']||r['Call Date']||'');
var hm = t.match(/(\d{1,2}):(\d{2})/);
if (hm) byHour[parseInt(hm[1],10)]++;
var callDay = parseDate(r['Call Date']);
if (callDay) activeCallDays[dStr(callDay)] = true;
});
var recordedDays = Math.max(1, Object.keys(activeCallDays).length);
var hours =[];
for (var i=0;i<24;i++) hours.push(pad(i)+':00');
var hourEl = document.getElementById('ch-hourly');
if (hourEl) {
S.charts['hourly'] = new Chart(hourEl, {
type: 'bar',
data: { labels: hours,
datasets:[{ label:'Avg Inbound / Active Day', data: hours.map(function(_,i){return Math.round((byHour[i] / recordedDays) * 10) / 10;}), backgroundColor: hours.map(function(_,i){ return (i>=9&&i<19) ? (isDark ? 'rgba(0,229,255,0.7)' : 'rgba(29,78,216,.7)') : (isDark ? 'rgba(148,163,184,.2)' : 'rgba(148,163,184,.4)'); }), borderRadius:3 }]
},
options: { responsive:true, maintainAspectRatio:true, plugins:{legend:{display:false}}, scales:{x:{ticks:{color:tickC, font:{size:8},maxRotation:45},grid:{display:false}},y:{ticks:{color:tickC, font:{size:9}},grid:{color:gridC}}} }
});
}
}
}

// ================================================================
// ATTRIBUTE EXPLORER
// ================================================================
var ATTR_DEFS =[
{ key:'broker', label:'RM Broker Name', field:'RM Broker Name', fallback:'Broker ID (B2B)', highlight:true },
{ key:'branch', label:'Branch / Location', field:'Branch/Location', highlight:true },
{ key:'rm', label:'RM Name', field:'RM Name', fallback:'Owners[0]', highlight:true },
{ key:'channel', label:'Channel (B2B)', field:'Channel (B2B)', highlight:true },
{ key:'issue', label:'Issue Type', field:'Issue Type (B2B)', fallback:'Subtype' },
{ key:'subissue',label:'Sub-Issue Type', field:'Sub Issue Type (B2B)' }
];

var DRILL_ATTRS =[
{ field:'RM Broker Name', label:'RM Broker Name' },
{ field:'Branch/Location', label:'Branch / Location' },
{ field:'RM Name', label:'RM Name' },
{ field:'Channel (B2B)', label:'Channel' },
{ field:'Issue Type (B2B)', label:'Issue Type' },
{ field:'Sub Issue Type (B2B)', label:'Sub-Issue' }
];

function getAttrDefByField(field) {
for (var i = 0; i < ATTR_DEFS.length; i++) {
if (ATTR_DEFS[i].field === field) return ATTR_DEFS[i];
}
return null;
}

function renderAttrExplorer(rows, prevRows) {
var activeAttr = ATTR_DEFS.find(function(a){return a.key===S.attrTab;}) || ATTR_DEFS[0];

var h = '<div id="attr-explorer-section">';
h += '<div class="sec-head">🔍 Attribute Explorer <span>Horizontal Scroll | Click any attribute to drill down</span></div>';
h += '<div class="attr-explorer">';

h += '<div class="attr-tabs">';
ATTR_DEFS.forEach(function(a) {
h += '<button class="attr-tab'+(a.highlight?' rm-detail':'')+(a.key===S.attrTab?' active':'')+'" onclick="switchAttrTab(\''+a.key+'\')">'+a.label+'</button>';
});
h += '</div>';

h += '<div class="attr-body">';

var countMap = {};
rows.forEach(function(r) {
var v = getAttrValue(r, activeAttr);
countMap[v] = (countMap[v]||0) + 1;
});
var prevCountMap = {};
prevRows.forEach(function(r) {
var v = getAttrValue(r, activeAttr);
prevCountMap[v] = (prevCountMap[v]||0) + 1;
});

var total = rows.length || 1;
var sorted = Object.keys(countMap).sort(function(a,b){return countMap[b]-countMap[a];});

h += '<div class="attr-values">';
sorted.forEach(function(val) {
var p = pct(countMap[val], total);
var isSelected = S.attrSelected === val;
h += '<div class="attr-value-card'+(isSelected?' selected':'')+'" onclick="selectAttrValue(\''+escAttr(val)+'\')">';
h += '<div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">';
h += '<div class="attr-value-name" title="'+escHtml(val)+'">'+escHtml(val)+'</div>';
h += '<span class="deepdive-indicator">Deepdive</span>';
h += '</div>';
h += '<div class="attr-value-count">'+countMap[val]+'</div>';
h += '<div class="attr-value-pct">'+p+'% of period &nbsp;';
var prev = prevCountMap[val] || 0;
if (prev) {
var chg = Math.round((countMap[val]-prev)/prev*100);
h += '<span style="color:'+(chg>=0?'var(--green)':'var(--red)')+';font-weight:700">'+(chg>=0?'↑':'↓')+Math.abs(chg)+'%</span>';
}
h += '</div></div>';
});
if (!sorted.length) h += '<div style="color:var(--txt3);padding:20px">No data for this attribute in the selected period.</div>';
h += '</div>';

if (S.attrSelected) {
h += renderDrillPanel(rows, activeAttr, S.attrSelected);
}
h += renderAttrTabInsights(rows, activeAttr, countMap);

h += '</div></div></div>';
return h;
}

function renderDrillPanel(rows, activeAttr, selectedVal) {
var filtered = rows.filter(function(r){ return getAttrValue(r, activeAttr) === selectedVal; });
var total = filtered.length || 1;

var h = '<div class="drill-panel">';
h += '<div class="drill-title"><span class="chip">'+escHtml(activeAttr.label)+'</span> <strong>'+escHtml(selectedVal)+'</strong> — '+filtered.length+' records &nbsp;<span style="font-size:11px;color:var(--txt3)">(click another card to change, click same to deselect)</span></div>';
h += '<div class="drill-grid">';

DRILL_ATTRS.forEach(function(attr) {
if (attr.field === activeAttr.field) return;
var m = {};
filtered.forEach(function(r) {
var def = getAttrDefByField(attr.field) || { field: attr.field };
var v = def.field ? getAttrValue(r, def) : normalizeMissing(r[attr.field]);
if (!v) v = 'NA';
m[v]=(m[v]||0)+1;
});
var keys = Object.keys(m).sort(function(a,b){return m[b]-m[a];}).slice(0,7);
if (!keys.length) return;
var maxV = m[keys[0]] || 1;
var jumpAttr = getAttrDefByField(attr.field);

h += '<div class="drill-card"><h4>'+attr.label+'</h4>';
keys.forEach(function(k) {
var w = Math.round(m[k]/maxV*100);
var p2 = pct(m[k], total);
var clickable = jumpAttr ? ' jumpable' : '';
var clickOpen = jumpAttr ? ' onclick="jumpToAttrValue(\''+jumpAttr.key+'\', \''+escAttr(k)+'\')"' : '';
h += '<div class="drill-row">' +
'<div class="drill-row-label'+clickable+'" title="'+escHtml(k)+'"'+clickOpen+'>'+escHtml(k)+'</div>' +
'<div class="drill-row-bar"><div class="drill-row-bar-fill" style="width:'+w+'%"></div></div>' +
'<div class="drill-row-val">'+m[k]+'<span style="color:var(--txt3);font-size:10px;margin-left:3px">'+p2+'%</span></div>' +
'</div>';
});
h += '</div>';
});

if (['broker','branch','rm'].indexOf(activeAttr.key) !== -1) {
var freq = {};
filtered.forEach(function(r) {
var day = getRecordDateKey(r);
freq[day] = (freq[day] || 0) + 1;
});
var days = Object.keys(freq).sort();
var maxFreq = days.reduce(function(max, day) { return Math.max(max, freq[day]); }, 1);
var avgPerDay = Math.round((filtered.length / Math.max(1, days.length)) * 10) / 10;
var peakDay = days.slice().sort(function(a,b){ return freq[b]-freq[a]; })[0] || 'NA';

h += '<div class="drill-card"><h4>Contact Frequency</h4>';
h += '<div style="font-size:11px;color:var(--txt2);margin-bottom:10px">Avg ' + avgPerDay + ' contacts per active day. Peak day: <strong>' + escHtml(peakDay) + '</strong>' + (peakDay !== 'NA' ? ' (' + freq[peakDay] + ')' : '') + '.</div>';
days.slice(0, 10).forEach(function(day) {
var w2 = Math.round(freq[day] / maxFreq * 100);
h += '<div class="drill-row">' +
'<div class="drill-row-label">' + escHtml(day) + '</div>' +
'<div class="drill-row-bar"><div class="drill-row-bar-fill" style="width:' + w2 + '%"></div></div>' +
'<div class="drill-row-val">' + freq[day] + '</div>' +
'</div>';
});
h += '</div>';
}

var comments = filtered.map(function(r){ return String(r['Comments']||r['Body']||'').trim(); }).filter(Boolean);
if (comments.length) {
h += '<div class="drill-card"><h4>Sample Comments ('+comments.length+')</h4>';
comments.slice(0,4).forEach(function(c) {
h += '<div style="font-size:11px;color:var(--txt2);padding:5px 0;border-bottom:1px solid var(--surface2)">'+escHtml(c.substring(0,120))+(c.length>120?'…':'')+'</div>';
});
h += '</div>';
}

h += '<div class="drill-card"><h4>Linked Ticket/Conversation Deepdive</h4>' + renderLinkedRecordTable(filtered, S.attrTab !== 'whatsapp') + '</div>';

h += '</div></div>';
return h;
}

function renderAttrTabInsights(rows, activeAttr, countMap) {
var keys = Object.keys(countMap).sort(function(a,b){ return countMap[b] - countMap[a]; });
if (!keys.length) return '';
var topValue = keys[0];
var topCount = countMap[topValue];
var total = rows.length || 1;
var topShare = Math.round((topCount / total) * 100);
var filtered = rows.filter(function(r){ return getAttrValue(r, activeAttr) === topValue; });
var topIssues = {};
var topSubIssues = {};
var topBranches = {};
filtered.forEach(function(r) {
var issue = getIssueValue(r);
var subIssue = getSubIssueValue(r);
var branch = getBranchValue(r);
if (issue !== 'NA') topIssues[issue] = (topIssues[issue] || 0) + 1;
if (subIssue !== 'NA') topSubIssues[subIssue] = (topSubIssues[subIssue] || 0) + 1;
if (branch !== 'NA') topBranches[branch] = (topBranches[branch] || 0) + 1;
});
function topN(map, n) {
return Object.keys(map).sort(function(a,b){ return map[b] - map[a]; }).slice(0, n).map(function(k){ return k + ' (' + map[k] + ')'; }).join(', ') || 'NA';
}
var h = '<div class="issue-panel" style="margin-top:12px"><div class="issue-panel-head"><h3>Tab Deepdive: ' + escHtml(activeAttr.label) + '</h3><span class="deepdive-indicator">Insights</span></div><div class="issue-panel-body">';
h += '<div class="issue-row"><div><div class="issue-row-label">Top ' + escHtml(activeAttr.label) + '</div><div class="issue-row-meta">' + escHtml(topValue) + ' dominates with ' + topShare + '% share.</div></div><div class="issue-row-count">' + topCount + '</div><div><div class="fill-track"><span style="width:' + topShare + '%"></span></div></div></div>';
h += '<div class="issue-row"><div><div class="issue-row-label">Top Issue Types</div><div class="issue-row-meta">' + escHtml(topN(topIssues, 3)) + '</div></div><div class="issue-row-count"></div><div></div></div>';
h += '<div class="issue-row"><div><div class="issue-row-label">Top Sub Issue Types</div><div class="issue-row-meta">' + escHtml(topN(topSubIssues, 3)) + '</div></div><div class="issue-row-count"></div><div></div></div>';
h += '<div class="issue-row"><div><div class="issue-row-label">Top Branches</div><div class="issue-row-meta">' + escHtml(topN(topBranches, 3)) + '</div></div><div class="issue-row-count"></div><div></div></div>';
h += '<div class="issue-sample">Tip: click any card above to open a record-level drilldown for this tab.</div>';
h += '</div></div>';
return h;
}

function switchAttrTab(key) {
S.attrTab = key;
S.attrSelected = null;
re_render_explorer();
}

function selectAttrValue(val) {
S.attrSelected = (S.attrSelected === val) ? null : val;
re_render_explorer();
}

function jumpToAttrValue(attrKey, val) {
S.attrTab = attrKey;
S.attrSelected = val;
re_render_explorer();
}

function openExplorerFromSummary(attrKey, val) {
S.attrTab = attrKey;
S.attrSelected = val;
re_render_explorer();
setTimeout(function() {
var el = document.getElementById('attr-explorer-section');
if (el && el.scrollIntoView) el.scrollIntoView({ behavior:'smooth', block:'start' });
}, 30);
}

function renderSummaryJump(label, attrKey, val, subtle) {
if (!val || val === 'NA') return '<span class="jump-pill subtle">NA</span>';
return '<button class="jump-pill'+(subtle?' subtle':'')+'" onclick="openExplorerFromSummary(\''+attrKey+'\', \''+escAttr(val)+'\')" title="Open deepdive for '+escHtml(label)+'">'+escHtml(label)+'</button>';
}

function renderRMLensJump(label, type, val, subtle) {
if (!val || val === 'NA') return '<span class="jump-pill subtle">NA</span>';
return '<button class="jump-pill'+(subtle?' subtle':'')+'" onclick="setRMOpsDeepDive(\''+type+'\', \''+escAttr(val)+'\')" title="Open RM lens deepdive for '+escHtml(label)+'">'+escHtml(label)+'</button>';
}

function re_render_explorer() {
var y = window.scrollY || window.pageYOffset || 0;
render();
window.requestAnimationFrame(function() {
window.scrollTo(0, y);
});
}

function renderCommonIssues(rows) {
if (!rows.length) return '';

var issueMap = {};
rows.forEach(function(r) {
var issue = getIssueValue(r);
var subIssue = getSubIssueValue(r);
var broker = getBrokerValue(r);
var rm = getRmValue(r);
var branch = getBranchValue(r);
var channel = getChannelValue(r);
var comment = String(r['Comments'] || r['Body'] || '').trim();
var key = issue === 'NA' ? 'NA' : issue + (subIssue !== 'NA' ? ' / ' + subIssue : '');
if (!issueMap[key]) {
issueMap[key] = { count:0, brokers:{}, rms:{}, branches:{}, channels:{}, issue:issue, subIssue:subIssue, samples:[] };
}
issueMap[key].count++;
if (broker !== 'NA') issueMap[key].brokers[broker] = (issueMap[key].brokers[broker] || 0) + 1;
if (rm !== 'NA') issueMap[key].rms[rm] = (issueMap[key].rms[rm] || 0) + 1;
if (branch !== 'NA') issueMap[key].branches[branch] = (issueMap[key].branches[branch] || 0) + 1;
if (channel !== 'NA') issueMap[key].channels[channel] = (issueMap[key].channels[channel] || 0) + 1;
if (comment && issueMap[key].samples.length < 2) issueMap[key].samples.push(comment);
});

var topIssueKeys = Object.keys(issueMap).filter(function(k){ return k !== 'NA'; }).sort(function(a,b) {
return issueMap[b].count - issueMap[a].count;
}).slice(0, 10);

if (!topIssueKeys.length) return '';

function topLabel(map) {
var keys = Object.keys(map).sort(function(a,b){ return map[b]-map[a]; });
return keys.length ? keys[0] + ' (' + map[keys[0]] + ')' : 'NA';
}
function topKeyOnly(map) {
var keys = Object.keys(map).sort(function(a,b){ return map[b]-map[a]; });
return keys.length ? keys[0] : 'NA';
}

var branchFreq = {};
var rmFreq = {};
var brokerFreq = {};
var channelFreq = {};
rows.forEach(function(r) {
var branch = getBranchValue(r);
var rm = getRmValue(r);
var broker = getBrokerValue(r);
var channel = getChannelValue(r);
if (branch !== 'NA') branchFreq[branch] = (branchFreq[branch] || 0) + 1;
if (rm !== 'NA') rmFreq[rm] = (rmFreq[rm] || 0) + 1;
if (broker !== 'NA') brokerFreq[broker] = (brokerFreq[broker] || 0) + 1;
if (channel !== 'NA') channelFreq[channel] = (channelFreq[channel] || 0) + 1;
});

var topBranches = Object.keys(branchFreq).sort(function(a,b){ return branchFreq[b]-branchFreq[a]; }).slice(0, 8);
var topRms = Object.keys(rmFreq).sort(function(a,b){ return rmFreq[b]-rmFreq[a]; }).slice(0, 8);
var topBrokers = Object.keys(brokerFreq).sort(function(a,b){ return brokerFreq[b]-brokerFreq[a]; }).slice(0, 8);
var topChannels = Object.keys(channelFreq).sort(function(a,b){ return channelFreq[b]-channelFreq[a]; }).slice(0, 8);
var maxBranch = topBranches.reduce(function(max, key){ return Math.max(max, branchFreq[key]); }, 1);
var maxRm = topRms.reduce(function(max, key){ return Math.max(max, rmFreq[key]); }, 1);
var maxBroker = topBrokers.reduce(function(max, key){ return Math.max(max, brokerFreq[key]); }, 1);
var maxChannel = topChannels.reduce(function(max, key){ return Math.max(max, channelFreq[key]); }, 1);

var h = '<div id="common-issues-section">';
h += '<div class="sec-head">📌 Most Common Issues <span>Combined using issue, sub-issue, broker, RM, branch and comments</span></div>';
h += '<div class="issue-grid">';

h += '<div class="issue-panel"><div class="issue-panel-head"><h3>Issue Patterns</h3><span class="deepdive-indicator">New</span></div><div class="issue-panel-body">';
topIssueKeys.forEach(function(key) {
var info = issueMap[key];
var topBroker = topKeyOnly(info.brokers);
var topRm = topKeyOnly(info.rms);
var topBranch = topKeyOnly(info.branches);
var topChannel = topKeyOnly(info.channels);
h += '<div class="issue-row">';
h += '<div><div class="issue-row-label">' + renderSummaryJump(info.issue, 'issue', info.issue) + (info.subIssue !== 'NA' ? renderSummaryJump(info.subIssue, 'subissue', info.subIssue) : '') + '</div>';
h += '<div class="issue-row-meta">Open deepdives for the issue, sub-issue, broker, RM, branch and channel directly from here.</div>';
h += '<div class="issue-meta-jumps">' +
renderSummaryJump('Broker: ' + topLabel(info.brokers), 'broker', topBroker, true) +
renderSummaryJump('RM: ' + topLabel(info.rms), 'rm', topRm, true) +
renderSummaryJump('Branch: ' + topLabel(info.branches), 'branch', topBranch, true) +
renderSummaryJump('Channel: ' + topLabel(info.channels), 'channel', topChannel, true) +
'</div></div>';
h += '<div class="issue-row-count">' + info.count + '</div>';
h += '<div><div class="fill-track"><span style="width:' + Math.min(100, info.count / issueMap[topIssueKeys[0]].count * 100) + '%"></span></div>';
if (info.samples.length) {
h += '<div class="issue-sample">' + escHtml(info.samples[0].substring(0, 140)) + (info.samples[0].length > 140 ? '…' : '') + '</div>';
}
h += '</div></div>';
});
h += '</div></div>';

h += '<div class="issue-panel"><div class="issue-panel-head"><h3>Contact Frequency Hotspots</h3><span style="font-size:11px;color:var(--txt3)">Who is contacting most</span></div><div class="issue-panel-body">';
h += '<div style="font-size:11px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Top Branches</div>';
topBranches.forEach(function(key) {
var pctWidth = Math.round(branchFreq[key] / maxBranch * 100);
h += '<div class="issue-row"><div><div class="issue-row-label">' + renderSummaryJump(key, 'branch', key) + '</div></div><div class="issue-row-count">' + branchFreq[key] + '</div><div><div class="fill-track"><span style="width:' + pctWidth + '%"></span></div></div></div>';
});
h += '<div style="font-size:11px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px">Top RMs</div>';
topRms.forEach(function(key) {
var pctWidth2 = Math.round(rmFreq[key] / maxRm * 100);
h += '<div class="issue-row"><div><div class="issue-row-label">' + renderSummaryJump(key, 'rm', key) + '</div></div><div class="issue-row-count">' + rmFreq[key] + '</div><div><div class="fill-track"><span style="width:' + pctWidth2 + '%"></span></div></div></div>';
});
h += '<div style="font-size:11px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px">Top Brokers</div>';
topBrokers.forEach(function(key) {
var pctWidth3 = Math.round(brokerFreq[key] / maxBroker * 100);
h += '<div class="issue-row"><div><div class="issue-row-label">' + renderSummaryJump(key, 'broker', key) + '</div></div><div class="issue-row-count">' + brokerFreq[key] + '</div><div><div class="fill-track"><span style="width:' + pctWidth3 + '%"></span></div></div></div>';
});
h += '<div style="font-size:11px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px">Top Channels</div>';
topChannels.forEach(function(key) {
var pctWidth4 = Math.round(channelFreq[key] / maxChannel * 100);
h += '<div class="issue-row"><div><div class="issue-row-label">' + renderSummaryJump(key, 'channel', key) + '</div></div><div class="issue-row-count">' + channelFreq[key] + '</div><div><div class="fill-track"><span style="width:' + pctWidth4 + '%"></span></div></div></div>';
});
h += '</div></div>';

h += '</div></div>';
return h;
}

// ================================================================
