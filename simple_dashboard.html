function runAISummary() {
if (S.aiRunning) return;
S.aiRunning = true;
S.aiResult = null;

var ctRows = filterByDate(S.callTkts, 'Created date', S.dateFrom, S.dateTo);
var waRows = filterByDate(S.whatsapp, 'Created date', S.dateFrom, S.dateTo);

var rows =[];
if (S.channelTab === 'combined') rows = ctRows.concat(waRows);
else if (S.channelTab === 'calls') rows = ctRows;
else if (S.channelTab === 'whatsapp') rows = waRows;

// Extract just the text comments
var comments = rows
.map(function(r){ return String(r['Comments']||r['Body']||'').trim(); })
.filter(Boolean);

if (!comments.length) {
S.aiRunning = false; S.aiResult = { error:'No comments found for this period.' };
re_render_explorer(); return;
}

var wkLabel = dStr(S.dateFrom) + ' to ' + dStr(S.dateTo);

re_render_explorer(); // Show loading state

// Calling proxy function in Code.gs instead of direct JS fetch (solves CORS!)
google.script.run
.withSuccessHandler(function(data) {
S.aiRunning = false;
S.aiResult = data;
re_render_explorer();
})
.withFailureHandler(function(e) {
S.aiRunning = false;
S.aiResult = { error: e.message };
re_render_explorer();
})
.getAISummary(comments, wkLabel);
}

// ================================================================
// UTILS
// ================================================================
function escHtml(s) {
return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
return String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

function parseDateTimeVal(v) {
if (v == null || v === '') return null;
if (typeof v === 'number') { var d0 = new Date(v); return isNaN(d0.getTime()) ? null : d0; }
var t = new Date(String(v).trim());
if (!isNaN(t.getTime())) return t;
return parseDate(v);
}

function formatShortTsVal(v) {
var d = parseDateTimeVal(v);
if (!d) return '';
return d.toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: true });
}

function generateDevRevLink(id) {
if (!id) return '-';
var clean = String(id).trim();
if (!clean) return '-';
var baseUrl = "https://app.devrev.ai/smallcasebp/";
return clean.indexOf('TKT-') === 0
? '<a href="' + baseUrl + 'works/' + clean + '" target="_blank" class="link-style">' + clean + '</a>'
: '<a href="' + baseUrl + 'inbox/' + clean + '" target="_blank" class="link-style">' + clean + '</a>';
}

function generateDevRevLinkWithTime(id, createdVal) {
if (!id) return '-';
var link = generateDevRevLink(id);
var ts = formatShortTsVal(createdVal);
if (!ts) return link;
return link + ' <span style="font-size:10px;color:var(--txt3);white-space:nowrap">' + ts + '</span>';
}

function ticketTypeS(r) {
var t = String(r['Title'] || '').toLowerCase();
if (t.indexOf('missed') !== -1) return 'Missed';
if (t.indexOf('aoh') !== -1) return 'AOH';
if (t.indexOf('answered') !== -1) return 'Answered';
return 'Other';
}

function last10DigitsS(str) {
var dig = String(str || '').replace(/\D/g, '');
if (dig.length < 10) return '';
return dig.slice(-10);
}

function extractPhoneFromTicketS(tkt) {
var t = last10DigitsS(tkt['Title'] || '');
if (t.length === 10) return t;
var r = last10DigitsS(tkt['Reported by[0]'] || '');
return r.length >= 10 ? r.slice(-10) : '';
}

function ticketCreatedMsVal(r) {
var d = parseDateTimeVal(r['Created date']);
return d ? d.getTime() : NaN;
}

function ozonetelCallMsVal(r) {
var d = parseDate(r['Call Date']);
if (!d) return NaN;
var st = String(r['Start Time'] || '').trim();
var m = st.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
if (m) d.setHours(parseInt(m[1], 10), parseInt(m[2], 10), m[3] ? parseInt(m[3], 10) : 0, 0);
return d.getTime();
}

function getRawRecordingUrlS(r) {
if (!r) return '';
var keys = ['Recording URL', 'Recording_URL', 'Ozonetel_Link', 'Ozonetel Link', 'Audio URL', 'Call Recording URL'];
for (var i = 0; i < keys.length; i++) {
var v = String(r[keys[i]] || '').trim();
if (v) return v;
}
return '';
}

function findInboundForTicketS(tkt, calls) {
var phone = extractPhoneFromTicketS(tkt);
if (phone.length !== 10) return null;
var ticketMs = ticketCreatedMsVal(tkt);
if (isNaN(ticketMs)) return null;
var candidates = calls.filter(function(c) {
return last10DigitsS(c['Caller No']) === phone && String(c['Call Type'] || '') === 'Inbound';
});
var best = null, bestScore = Infinity;
candidates.forEach(function(c) {
var cm = ozonetelCallMsVal(c);
if (isNaN(cm)) return;
var delta = ticketMs - cm;
if (delta < 1000 || delta > 120000) return;
var score = Math.abs(delta - 15000);
if (score < bestScore) { bestScore = score; best = c; }
});
return best;
}

function findNextProgressiveRecordingS(inboundRow, calls, phone) {
var t0 = ozonetelCallMsVal(inboundRow);
if (isNaN(t0)) return '';
var prog = calls.filter(function(c) {
return String(c['Call Type'] || '') === 'Progressive' && last10DigitsS(c['Caller No']) === phone && ozonetelCallMsVal(c) > t0;
}).sort(function(a, b){ return ozonetelCallMsVal(a) - ozonetelCallMsVal(b); });
for (var i = 0; i < prog.length; i++) {
var url = getRawRecordingUrlS(prog[i]);
if (url) return url;
}
return '';
}

function resolveRecordingForCallTicketS(tkt) {
var direct = getRawRecordingUrlS(tkt);
if (direct) return direct;
var calls = excludeInvalidNumber(S.calls || []);
if (!calls.length) return '';
var inbound = findInboundForTicketS(tkt, calls);
if (!inbound) return '';
var tt = ticketTypeS(tkt);
if (tt === 'Answered') return getRawRecordingUrlS(inbound) || '';
if (tt === 'Missed' || tt === 'AOH') {
var phone = last10DigitsS(inbound['Caller No']);
var pg = findNextProgressiveRecordingS(inbound, calls, phone);
if (pg) return pg;
return getRawRecordingUrlS(inbound) || '';
}
return getRawRecordingUrlS(inbound) || '';
}

function recordingUrlToAnchorS(url) {
if (!url) return '-';
return '<a href="' + url + '" target="_blank" class="link-style">▶ Listen</a>';
}

function getRowDeepDiveId(r) {
return String(r['Work ID'] || r['WorkID'] || r['ID'] || r['Conversation ID'] || r['Ticket ID'] || '').trim();
}

function getRowRecordingLink(r) {
var wid = String(r['Work ID'] || '').trim();
if (wid.indexOf('TKT-') === 0) {
return recordingUrlToAnchorS(resolveRecordingForCallTicketS(r));
}
var keys = ['Recording URL', 'Recording_URL', 'Ozonetel_Link', 'Ozonetel Link', 'Audio URL', 'Call Recording URL'];
for (var i = 0; i < keys.length; i++) {
var v = String(r[keys[i]] || '').trim();
if (v) return '<a href="' + v + '" target="_blank" class="link-style">▶ Listen</a>';
}
return '-';
}

function renderLinkedRecordTableInner(rows, showRecordingCol, maxRows) {
var lim = maxRows || 120;
var h = '<div class="table-wrap"><table><thead><tr><th>Ticket/Conv ID</th><th>Created</th><th>RM Name</th><th>RM Broker Name</th><th>Branch</th><th>Issue Type</th><th>Sub-Issue</th>';
if (showRecordingCol) h += '<th>Recording</th>';
h += '</tr></thead><tbody>';
rows.slice(0, lim).forEach(function(r){
var id = getRowDeepDiveId(r);
h += '<tr><td>' + (id ? generateDevRevLinkWithTime(id, r['Created date']) : '-') + '</td>' +
'<td style="font-size:10px;color:var(--txt3);white-space:nowrap">' + (formatShortTsVal(r['Created date']) || '—') + '</td>' +
'<td>' + escHtml(getRmValue(r)) + '</td>' +
'<td>' + escHtml(getBrokerValue(r)) + '</td>' +
'<td>' + escHtml(getBranchValue(r)) + '</td>' +
'<td>' + escHtml(getIssueValue(r)) + '</td>' +
'<td>' + escHtml(getSubIssueValue(r)) + '</td>';
if (showRecordingCol) h += '<td>' + getRowRecordingLink(r) + '</td>';
h += '</tr>';
});
h += '</tbody></table></div>';
return h;
}

function renderLinkedRecordTable(rows, showRecordingCol) {
if (!rows.length) return '<div class="mini-note">No linked ticket/chat records in this slice.</div>';
window._linkedRecordSnap = { rows: rows, showRecording: showRecordingCol };
return '<div class="linked-records-shell"><div class="linked-records-toolbar"><button type="button" class="apply-btn" style="padding:5px 12px;font-size:11px" onclick="expandLinkedRecordsModal()">Expand</button></div><div class="linked-records-scroll">' + renderLinkedRecordTableInner(rows, showRecordingCol, 120) + '</div></div>';
}

window.expandLinkedRecordsModal = function() {
if (!window._linkedRecordSnap) return;
var snap = window._linkedRecordSnap;
var inner = renderLinkedRecordTableInner(snap.rows, snap.showRecording, 500);
var ov = document.createElement('div');
ov.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px';
ov.onclick = function(e){ if(e.target===ov) ov.remove(); };
var panel = document.createElement('div');
panel.style.cssText = 'background:var(--surface);border-radius:12px;padding:18px;max-width:1100px;width:96%;max-height:90vh;overflow:auto;box-shadow:var(--sh-lg)';
panel.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><strong style="font-size:14px">Linked ticket / conversation records</strong><button type="button" style="border:none;background:transparent;font-size:22px;cursor:pointer;line-height:1">&times;</button></div>' + inner;
panel.querySelector('button').onclick = function(){ ov.remove(); };
ov.appendChild(panel);
document.body.appendChild(ov);
};

var NETWORK_ERROR_STATUSES = ['invalidnumber','networkoutoforder'];
function excludeInvalidNumber(rows) {
return rows.filter(function(r) {
var ds = String(r['Dial Status']||'').trim().toLowerCase();
return NETWORK_ERROR_STATUSES.indexOf(ds) === -1;
});
}

</script>
